server:
  port: 8080

spring:
  application:
    name: system-design-coach-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/learningapp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Fartline*10b}

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  app:
    frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    org.hibernate.SQL: debug